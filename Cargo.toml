[package]
name         = "signal-router"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.88"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/signal-router"
description  = "Signal contract for Persona router observations and relations."
publish      = false

[lib]
name = "signal_router"
path = "src/lib.rs"

[dependencies]
nota-next              = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "main" }
signal-frame           = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main" }
signal-engine-management = { git = "https://github.com/LiGoldragon/signal-engine-management.git", branch = "main" }
signal-persona-origin    = { git = "https://github.com/LiGoldragon/signal-persona-origin.git", branch = "main" }
signal-message = { git = "https://github.com/LiGoldragon/signal-message.git", branch = "main" }
rkyv                   = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror              = "2"

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
